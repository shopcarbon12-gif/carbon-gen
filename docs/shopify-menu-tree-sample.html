<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Dark Shopify Menu Tree Sample</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #111827;
      --panel: #0a1324;
      --line: #556883;
      --line-soft: #43546c;
      --border: #45566f;
      --text: #e5e7eb;
      --muted: #9fb3cc;
      --accent: #0f8a64;
      --accent-border: #168e69;
      --blue: #7fb2ff;
      --hover: #13233d;
      --ring: #87a8da;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      padding: 24px;
    }

    .frame {
      max-width: 980px;
      margin: 0 auto;
      border: 1px solid #2a3547;
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.13);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .head h1 { margin: 0; font-size: 20px; }
    .head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .head code {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .save {
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid var(--accent-border);
      background: var(--accent);
      color: #f8fffc;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .tree-wrap {
      border: 1px solid #2a3547;
      border-radius: 10px;
      background: var(--panel);
      padding: 10px;
      overflow: auto;
      max-height: 70vh;
    }

    .nested-list {
      margin-left: 36px;
      padding-top: 4px;
      min-height: 10px;
      display: block;
    }
    .root { margin-left: 0; padding-top: 0; }

    .tree-item {
      position: relative;
      display: block;
      padding-bottom: 8px;
    }

    .nested-list > .tree-item::before {
      content: "";
      position: absolute;
      left: -22px;
      top: -8px;
      width: 22px;
      height: 31px;
      border-left: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      z-index: 0;
    }

    .nested-list > .tree-item:not(:last-child)::after {
      content: "";
      position: absolute;
      left: -22px;
      top: 23px;
      bottom: -8px;
      border-left: 1px solid var(--line);
      z-index: 0;
    }

    .tree-card {
      position: relative;
      z-index: 5;
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-radius: 8px;
      background: #0f1a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 10px;
    }

    .tree-card:hover {
      background: var(--hover);
      border-color: #5f789c;
    }

    .tree-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .drag { color: #7a889f; }
    .chev { color: var(--muted); cursor: pointer; }
    .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions { display: inline-flex; gap: 8px; color: #bcc9db; }

    .add-card {
      color: var(--blue);
      font-size: 13px;
      justify-content: flex-start;
      gap: 8px;
      cursor: pointer;
    }
    .add-card .plus { font-size: 15px; }

    .modal-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3, 8, 18, 0.46);
      backdrop-filter: blur(8px);
    }

    .modal {
      width: min(460px, 92vw);
      border: 1px solid #2a3547;
      border-radius: 12px;
      background: #0b1322;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
  </style>
</head>
<body>
  <section class="frame">
    <div class="head">
      <div>
        <h1>Main menu</h1>
        <p>Handle: <code>main-menu</code></p>
      </div>
      <button class="save">Save menu</button>
    </div>

    <div class="tree-wrap">
      <div class="nested-list root">
        <div class="tree-item">
          <div class="tree-card">
            <div class="tree-main">
              <span class="drag">⠿</span>
              <span class="chev">▾</span>
              <span class="title">MEN</span>
            </div>
            <div class="actions">✎ ⌫</div>
          </div>
          <div class="nested-list">
            <div class="tree-item">
              <div class="tree-card">
                <div class="tree-main">
                  <span class="drag">⠿</span>
                  <span class="chev">▾</span>
                  <span class="title">CLOTHING</span>
                </div>
                <div class="actions">✎ ⌫</div>
              </div>
              <div class="nested-list">
                <div class="tree-item">
                  <div class="tree-card">
                    <div class="tree-main">
                      <span class="drag">⠿</span>
                      <span class="chev"></span>
                      <span class="title">JEANS</span>
                    </div>
                    <div class="actions">✎ ⌫</div>
                  </div>
                </div>
                <div class="tree-item">
                  <button class="tree-card add-card"><span class="plus">⊕</span>Add menu item to CLOTHING</button>
                </div>
              </div>
            </div>
            <div class="tree-item">
              <button class="tree-card add-card"><span class="plus">⊕</span>Add menu item to MEN</button>
            </div>
          </div>
        </div>
        <div class="tree-item">
          <div class="tree-card">
            <div class="tree-main">
              <span class="drag">⠿</span>
              <span class="chev"></span>
              <span class="title">WOMEN</span>
            </div>
            <div class="actions">✎ ⌫</div>
          </div>
        </div>
        <div class="tree-item">
          <button class="tree-card add-card"><span class="plus">⊕</span>Add menu item</button>
        </div>
      </div>
    </div>
  </section>

  <div class="modal-mask">
    <div class="modal">
      <h2 style="margin:0">Add menu item</h2>
      <label>Name</label>
      <input />
      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button>Cancel</button>
        <button>Save</button>
      </div>
    </div>
  </div>
</body>
</html>
